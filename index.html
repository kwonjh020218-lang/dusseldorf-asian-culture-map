<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뒤셀도르프 아시안 컬처 맵</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="app-header">
    <div id="header-text">
      <h1>뒤셀도르프 아시안 컬처 맵</h1>
      <p class="subtitle">맛집·마트부터 만화카페·서점·명소까지</p>
    </div>

    <!-- 💡 국기만 노출하되, 외부 이미지(twemoji CDN) 대신 인라인 SVG 사용 -
         네트워크 요청이 필요 없어서 CDN이 느리거나 막혀도 항상 보임 -->
    <div id="lang-switcher">
      <button class="lang-btn active" data-lang="ko" type="button" aria-label="한국어">
        <svg class="flag-img" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg"><rect width="30" height="20" fill="#fff"/><path d="M15 4 A6 6 0 0 1 15 16 A3 3 0 0 1 15 10 A3 3 0 0 0 15 4 Z" fill="#c60c30"/><path d="M15 16 A6 6 0 0 1 15 4 A3 3 0 0 1 15 10 A3 3 0 0 0 15 16 Z" fill="#003478"/></svg>
      </button>
      <button class="lang-btn" data-lang="en" type="button" aria-label="English">
        <svg class="flag-img" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="30" fill="#00247d"/><path d="M0 0 L60 30 M60 0 L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0 L60 30 M60 0 L0 30" stroke="#cf142b" stroke-width="2"/><path d="M30 0 V30 M0 15 H60" stroke="#fff" stroke-width="10"/><path d="M30 0 V30 M0 15 H60" stroke="#cf142b" stroke-width="6"/></svg>
      </button>
      <button class="lang-btn" data-lang="de" type="button" aria-label="Deutsch">
        <svg class="flag-img" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg"><rect width="30" height="20" fill="#ffce00"/><rect width="30" height="13.3" fill="#000"/><rect width="30" height="6.7" fill="#dd0000"/></svg>
      </button>
    </div>
  </header>

  <div id="top-strip">
    <div id="level-badge">Lv.0 · 시작 전</div>
    <button id="roulette-btn" type="button">🎲 오늘 뭐 하지?</button>
  </div>

  <button id="taste-recommend-btn" type="button">🎯 내 취향 맞춤 추천 보기</button>

  <!-- 룰렛 결과 모달 -->
  <div id="roulette-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="roulette-result-name">
    <div class="modal-box">
      <div class="modal-emoji" aria-hidden="true">🎯</div>
      <div class="modal-subtitle">오늘의 추천</div>
      <div class="modal-place-name" id="roulette-result-name"></div>
      <button class="modal-close-btn" onclick="closeRouletteModal()">확인</button>
    </div>
  </div>

  <!-- 취향 맞춤 추천 모달 -->
  <div id="taste-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="taste-result-name">
    <div class="modal-box">
      <div class="modal-emoji" aria-hidden="true">🎯</div>
      <div class="modal-subtitle" id="taste-reason">취향을 분석해보니</div>
      <div class="modal-place-name" id="taste-result-name"></div>
      <button class="modal-close-btn" onclick="closeTasteModal()">확인</button>
    </div>
  </div>

  <div id="app-container">
    <aside id="sidebar">
      <button id="sidebar-handle" type="button" aria-label="목록 접기/펼치기" aria-expanded="true" aria-controls="filter-panel">
        <span class="handle-bar" aria-hidden="true"></span>
      </button>
      <div id="filter-panel">
        <input type="text" id="search-input" placeholder="장소 이름으로 검색..." aria-label="장소 이름으로 검색" />

        <div id="category-buttons"></div>

        <button id="filter-toggle-btn" type="button" aria-expanded="false" aria-controls="filter-more">⚙️ 필터 더보기 ▾</button>

        <div id="filter-more">
          <div id="price-buttons"></div>

          <div style="display: flex; gap: 1rem; margin-top: 2px;">
            <label class="checkbox-label"><input type="checkbox" id="vegan-checkbox" /> 🌱 비건 있음</label>
            <label class="checkbox-label"><input type="checkbox" id="spicy-checkbox" /> 🌶️ 매운 음식 있음</label>
          </div>

          <label class="checkbox-label"><input type="checkbox" id="photospot-checkbox" /> 📸 인생샷 스팟만 보기</label>
          <label class="checkbox-label"><input type="checkbox" id="fav-only-checkbox" /> ⭐ 즐겨찾기 해둔 곳만 보기</label>
        </div>

        <div id="location-row">
          <button id="locate-btn" type="button">🎯 내 위치</button>
          <button id="clear-route-btn" type="button">🚗 경로 지우기</button>
        </div>
      </div>

      <!-- 나만의 코스 패널 -->
      <div id="course-panel">
        <div id="course-header" onclick="toggleCoursePanelBody()" role="button" tabindex="0" aria-expanded="false" aria-controls="course-body" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCoursePanelBody();}">
          <span id="course-count-text">🧭 나만의 코스 (0곳)</span>
          <span id="course-toggle-arrow">▸</span>
        </div>
        <div id="course-body">
          <div id="course-empty">아직 담은 곳이 없어요. 장소를 담거나 추천 코스를 받아보세요.</div>
          <ol id="course-list"></ol>
          <div id="course-start-info" style="display:none;"></div>
          <div id="course-actions" style="display:none;">
            <button id="course-clear-btn" type="button">🗑 비우기</button>
          </div>
          <button id="course-recommend-btn" type="button">🎲 추천 코스 짜줘</button>
        </div>
      </div>

      <ul id="place-list"></ul>
    </aside>

    <main id="map" role="application" aria-label="뒤셀도르프 아시안 컬처 지도">
      <div id="map-loading">지도를 불러오는 중...</div>
    </main>
  </div>

  <script src="i18n.js"></script>
  <script src="script.js"></script>
</body>
</html>
