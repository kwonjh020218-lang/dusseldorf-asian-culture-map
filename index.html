<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뒤셀도르프 아시안 컬처 맵</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="app-header">
    <h1>뒤셀도르프 아시안 컬처 맵</h1>
    <p class="subtitle">맛집·마트부터 만화카페·서점·포토존까지 🇩🇪🎌</p>
  </header>

  <div id="top-strip">
    <div id="level-badge">Lv.0 · 아직 시작 전이에요</div>
    <button id="roulette-btn" type="button">🎲 오늘 뭐 하지?</button>
  </div>

  <!-- 룰렛 결과 모달 -->
  <div id="roulette-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="roulette-result-name">
    <div class="modal-box">
      <div class="modal-emoji" aria-hidden="true">🎯</div>
      <div class="modal-subtitle">오늘 당신의 운명은...</div>
      <div class="modal-place-name" id="roulette-result-name"></div>
      <button class="modal-close-btn" onclick="closeRouletteModal()">가보자!</button>
    </div>
  </div>

  <div id="app-container">
    <aside id="sidebar">
      <div id="filter-panel">
        <input
          type="text"
          id="search-input"
          placeholder="장소 이름으로 검색..."
          aria-label="장소 이름으로 검색"
        />

        <div id="category-buttons"></div>

        <button id="filter-toggle-btn" type="button" aria-expanded="false" aria-controls="filter-more">⚙️ 필터 더보기 ▾</button>

        <div id="filter-more">
          <div id="price-buttons"></div>

          <div style="display: flex; gap: 1rem; margin-top: 2px;">
            <label class="checkbox-label">
              <input type="checkbox" id="vegan-checkbox" />
              🌱 비건 있음
            </label>

            <label class="checkbox-label">
              <input type="checkbox" id="spicy-checkbox" />
              🌶️ 매운 음식 있음
            </label>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" id="photospot-checkbox" />
            📸 인생샷 스팟만 보기
          </label>

          <label class="checkbox-label">
            <input type="checkbox" id="fav-only-checkbox" />
            ⭐ 즐겨찾기 해둔 곳만 보기
          </label>
        </div>

        <div id="location-row">
          <button id="locate-btn" type="button">📍 내 위치</button>
          <button id="clear-route-btn" type="button">🚗 경로 지우기</button>
        </div>
      </div>

      <!-- 나만의 코스 패널 (비어있으면 접혀있고, 담기면 자동으로 펼쳐짐) -->
      <div id="course-panel">
        <div id="course-header" onclick="toggleCoursePanelBody()" role="button" tabindex="0" aria-expanded="false" aria-controls="course-body" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCoursePanelBody();}">
          <span id="course-count-text">🧭 나만의 코스 (0곳)</span>
          <span id="course-toggle-arrow">▸</span>
        </div>
        <div id="course-body">
          <div id="course-empty">아직 담은 곳이 없어요. 팝업에서 "🚩 코스에 담기"를 누르거나, 아래 "🎲 추천 코스 짜줘"를 눌러보세요.</div>
          <ol id="course-list"></ol>
          <div id="course-start-info" style="display:none;"></div>
          <div id="course-actions" style="display:none;">
            <button id="course-clear-btn" type="button">🗑 비우기</button>
          </div>
          <button id="course-recommend-btn" type="button">🎲 추천 코스 짜줘</button>
        </div>
      </div>

      <ul id="place-list"></ul>
    </aside>

    <main id="map" role="application" aria-label="뒤셀도르프 아시안 컬처 지도"></main>
  </div>

  <script src="script.js"></script>
</body>
</html>
